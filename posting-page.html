<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poetsen+One&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <title>Report Item</title>

    <style>
        :root {
            --ivory: #ece3da;
            --sand: #d1bda4;
            --clay: #8b7f71;
            --night: #1e3a6a;
            --onyx: #1b1b1b;
            --green-status: #306546;
            --red-status: #803636;
            --gold-status: #9e8442;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            background-color: var(--night);
            overflow: hidden;
            width: 100%;
            height: 100vh;
            font-family: 'Roboto Condensed', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-header { 
            position: absolute; 
            top: 14px; 
            left: 20px; 
            display: flex; 
            align-items: center; 
            z-index: 20; 
        }

        .app-logo { 
            width: 30px; 
            margin-right: 12px; 
        }

        .nav-title { 
            font-family: 'Poetsen One', sans-serif; 
            color: var(--ivory); 
            font-size: 18px; 
        }

        .wave-container { 
            position: absolute; 
            inset: 0; 
            z-index: 0; 
            pointer-events: none; 
        }

        .wave-container img { 
            position: absolute; 
            bottom: 0; 
            width: 110%; 
            height: auto; 
        }

        .post-card {
            position: relative;
            z-index: 10;
            background-color: var(--ivory);
            width: 95%;
            max-width: 700px;
            height: 90vh; 
            margin-top: 10vh;
            border-radius: 25px 25px 0 0;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .card-header {
            padding: 40px 45px 10px 45px;
            position: relative;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .btn-cancel {
            background-color: transparent;
            color: var(--clay);
            padding: 12px 25px;
            border: 1px solid var(--clay);
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            float: right;
            margin-top: 25px;
            margin-right: 10px;
            transition: 0.3s;
        }

        .btn-cancel:hover {
            background-color: var(--sand);
            color: var(--onyx);
        }

        .user-header h2 { 
            color: var(--night); 
            font-size: 28px; 
            line-height: 1.1; 
        }

        .user-header p { 
            color: var(--clay); 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 0.9rem; 
            margin-top: 4px; 
        }

        .card-body {
            padding: 10px 45px 40px 45px;
            overflow-y: auto;
            scrollbar-gutter: stable;
        }

        .card-body::-webkit-scrollbar { 
            width: 6px; 
        }

        .card-body::-webkit-scrollbar-thumb { 
            background: var(--sand); 
            border-radius: 10px; 
        }

        .card-body::-webkit-scrollbar-track { 
            background: transparent; 
        }

        .form-grid { 
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            align-items: flex-start; 
        }

        .inputs-area { 
            flex: 1;
        }

        .inputs-area textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--clay);
            padding: 10px 0;
            margin-bottom: 5px;
            font-family: inherit;
            font-size: 1.1rem;
            outline: none;
            color: var(--onyx);
        }

        .hashtag-container { 
            position: relative; 
            width: 100%; 
        }

        .suggestions {
            position: absolute;
            top: 100%; left: 0; width: 100%;
            background: var(--ivory);
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 50;
            display: none;
            max-height: 150px;
            overflow-y: auto;
        }

        .suggestions div { 
            padding: 12px; 
            cursor: pointer; 
            border-bottom: 1px solid var(--clay); 
            color: var(--onyx); 
        }

        .suggestions div:hover { 
            background: var(--sand); 
        }

        .suggestions::-webkit-scrollbar { 
            width: 6px; 
        }

        .suggestions::-webkit-scrollbar-thumb { 
            background: var(--sand); 
            border-radius: 10px; 
        }

        .suggestions::-webkit-scrollbar-track { 
            background: transparent; 
        }

        textarea { 
            resize: none; 
            overflow: hidden; 
            min-height: 35px; 
        }

        .status-area {
            width: 140px;
            flex-shrink: 0;
            margin-top: 3px;
        }

        #statusSelect {
            width: 100%;
            padding: 15px 25px; 
            border-radius: 20px;
            border: none;
            color: var(--ivory);
            font-weight: bold;
            background-color: var(--red-status);
            cursor: pointer;
            text-align: left;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22white%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px center; 
            background-size: 18px;
        }

        .status-options {
            background-color: var(--ivory);
            color: var(--night);
        }

        #statusSelect:hover {
            background-color: var(--clay);
            color: var(--ivory);
        }

        .upload-box {
            width: 100%;
            aspect-ratio: 16 / 8;
            background-color: var(--sand);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px dashed var(--clay);
            overflow: hidden;
            margin-top: 15px;
            position: relative;
        }

        .upload-box:hover { 
            background-color: #c7b196; 
        }

        .upload-box img { 
            width: 100%; 
            height: 100%; 
            object-fit:fill; 
            display: none; 
        }

        .upload-box span { 
            font-size: 40px; 
            color: var(--clay); 
        }

        .upload-box p { 
            font-weight: 500px; 
            color: var(--clay); 
            text-transform: lowercase; 
        }

        .btn-submit {
            background-color: var(--clay);
            color: var(--ivory);
            padding: 12px 40px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            float: right;
            margin-top: 25px;
            transition: 0.3s;
        }

        .btn-submit:hover { 
            background-color: var(--night); 
            transform: translateY(-2px); 
        }

        @media (max-width: 600px) {
            .card-header, .card-body { 
                padding: 25px; 
            }

            .upload-box { 
                aspect-ratio: 4 / 3; 
            }
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <img class="app-logo" src="/elements/app-logo.png" alt="logo">
        <h4 class="nav-title">CEAS FIND</h4>
    </div>

    <div class="wave-container">
            <img class="wave1" src="/elements/wave 1.png">
            <img class="wave2" src="/elements/wave 2.png">
            <img class="wave3" src="/elements/wave 3.png">
            <img class="wave4" src="/elements/wave 4.png">
            <img class="wave5" src="/elements/wave 5.png">
            <img class="wave6" src="/elements/wave 6.png">
    </div>

    <div class="post-card">
        <div class="card-header">
            <div class="user-header">
                <h2 id="displayUserName">Loading...</h2>
                <p id="displayUserRole">Role</p>
            </div>

            <div class="status-area">
                <select id="statusSelect" onchange="changeStatusColor(this)">
                    <option value="Unclaimed">Unclaimed</option>
                    <option value="Claimed">Claimed</option>
                    <option value="Pending">Pending</option>
                </select>
            </div>
        </div>

        <div class="card-body">
            <div class="form-grid">
                <div class="inputs-area">
                    <textarea placeholder="Lost: " rows="1"></textarea>
                    <textarea placeholder="Found: " rows="1"></textarea>
                    
                    <div class="hashtag-container">
                        <textarea id="categoryInput" placeholder="#Add Category" rows="1"></textarea>
                        <div id="suggestionBox" class="suggestions"></div>
                    </div>

                    <textarea id="descTextarea" placeholder="Add more description..." rows="1"></textarea>
                </div>
            </div>

            <label class="upload-box" for="imageInput">
                <input type="file" id="imageInput" accept="image/*" hidden>
                <div id="uploadPlaceholder" style="text-align: center;">
                    <span class="material-symbols-outlined">upload</span>
                    <p>upload photo</p>
                </div>
                <img id="previewImg" src="">
            </label>

            <button class="btn-submit" onclick="handlePostSubmit()">Add Post</button>
            <button class="btn-cancel" onclick="alert('Post Cancelled')">Cancel</button>
        </div>
    </div>

    <script>
        const currentUser = { name: "$userName", role: "$role" };
        document.getElementById('displayUserName').innerText = currentUser.name;
        document.getElementById('displayUserRole').innerText = currentUser.role;

        const categories = ["Clothing & Personal Gear", "Documents & Cards", "Electronics & Gadgets", "Keys & Accessories", "Stationery & Books", "Wallets & Bags"];
        const catInput = document.getElementById('categoryInput');
        const sugBox = document.getElementById('suggestionBox');

        catInput.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val.includes('#')) {
                const query = val.split('#').pop().toLowerCase();
                const matches = categories.filter(c => c.toLowerCase().includes(query));
                if (matches.length > 0) {
                    sugBox.innerHTML = matches.map(m => `<div onclick="setCat('${m}')">#${m}</div>`).join('');
                    sugBox.style.display = 'block';
                } else { sugBox.style.display = 'none'; }
            } else { sugBox.style.display = 'none'; }
        });

        function setCat(name) {
            catInput.value = "#" + name;
            sugBox.style.display = 'none';
        }

        document.querySelectorAll('.inputs-area textarea').forEach(textarea => {
            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });
        });

        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = document.getElementById('previewImg');
                    img.src = event.target.result;
                    img.style.display = 'block';
                    document.getElementById('uploadPlaceholder').style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        function changeStatusColor(select) {
            const colors = { 'Unclaimed': 'var(--red-status)', 'Claimed': 'var(--green-status)', 'Pending': 'var(--gold-status)' };
            select.style.backgroundColor = colors[select.value];
        }

        function handlePostSubmit() {
            const lostItem = document.querySelectorAll('.inputs-area textarea')[0].value;
            const foundItem = document.querySelectorAll('.inputs-area textarea')[1].value;
            const category = document.getElementById('categoryInput').value;
            const description = document.getElementById('descTextarea').value;
            const status = document.getElementById('statusSelect').value;
            const imageData = document.getElementById('previewImg').src;

            const newPost = {
                id: Date.now(),
                user: $userName, 
                lostItem,
                foundItem,
                category,
                description,
                status,
                image: imageData,
                timestamp: new Date().toLocaleString()
            };

            const existingPosts = JSON.parse(localStorage.getItem('ceas_posts')) || [];

            existingPosts.unshift(newPost);

            localStorage.setItem('ceas_posts', JSON.stringify(existingPosts));

            alert("Post shared successfully!");
            window.location.href = "homepage.html";
        }
    </script>
</body>
</html>
