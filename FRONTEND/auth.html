<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poetsen+One&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Authentication</title>
    <style>
        :root {
            --white: #ffffff;
            --baby-blue: #a3b8ed;
            --bg-white: #f0f0f0;
            --clay: #8b7f71;
            --night: #1e3a6a;
            --onyx: #1b1b1b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--night);
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Roboto Condensed', sans-serif;
        }

        .main-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .header {
            position: absolute;
            top: 40px;
            left: 5%;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 20;;
        }
        
        .app-logo {
            position: relative;
            width: 25px;
            height: auto;
            transform: scaleX(-1);
        }

        h4 {
            position: relative;
            font-size: 20px;
            font-family: 'Poetsen One', sans-serif;
            color: var(--white);
            margin: 0;
        }

        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            width: 500px;
            margin-top: 130px;
        }

        .wave-container {
            position: absolute;
            bottom: 0px;
            left: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .wave1 {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            width: 110%; 
            height: auto;
            pointer-events: none;
            animation: move-wave linear infinite;
            animation-duration: 28s; 
            z-index: 1; 
        }

        .wave2 {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            width: 110%; 
            height: auto;
            pointer-events: none;
            animation: move-wave linear infinite;
            animation-duration: 14s; 
            z-index: 2; 
        }

        .wave3 {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            width: 110%; 
            height: auto;
            pointer-events: none;
            animation: move-wave linear infinite;
            animation-duration: 7s; 
            z-index: 3; 
        }

        .wave4 {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            width: 110%; 
            height: auto;
            pointer-events: none;
            animation: move-wave linear infinite;
            animation-duration: 21s; 
            z-index: 4; 
        }

        .wave5 {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            width: 110%; 
            height: auto;
            pointer-events: none;
            animation: move-wave linear infinite;
            animation-duration: 14s; 
            z-index: 5; 
        }

        .wave6 {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            width: 110%; 
            height: auto;
            pointer-events: none;
            animation: move-wave linear infinite;
            animation-duration: 7s; 
            z-index: 6; 
        }

        @keyframes move-wave {
            0% { transform: translateX(0); }
            50% { transform: translateX(-5%); }
            100% { transform: translateX(0); }
        }

        h1 {
            text-align: center;
            font-family: 'Poetsen One', sans-serif; 
            font-weight: 180;
            color: var(--white); 
            margin-bottom: 50px; 
            font-size: 100px; 
        }

        label { 
            display: block; 
            color: var(--baby-blue); 
            font-size: 14px; 
            margin-bottom: 10px; 
            text-align: center;
        }

        .p-notice {
            text-align: center;
            color: var(--white);
            margin-bottom: 60px;
        }

        .p-con {
            text-align: center;
            color: var(--night);
            margin-bottom: 60px;
        }

        a {
            color: var(--white);
            text-decoration: none;
        }

        a:hover {
            color: var(--night);
            text-decoration: underline;
        }
    
        button { 
            width: 100%; 
            padding: 12px; 
            background: var(--white); 
            color: var(--night); 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-family: 'Poetsen One', sans-serif;
            margin-bottom: 150px;
        }

        button:hover {
            transform: scale(1.05);
            background: rgb(30,58,106,0.3);
            color: var(--white);
        }

        @keyframes move-wave {
            0%, 100% { transform: translateX(0%); }
            50% { transform: translateX(-5%); }
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0%); }
            50% { transform: translateY(-3%); }
        }

        @keyframes movement {
            0%, 100% { transform: translateX(0%); }
            50% { transform: translateX(2%); }
        }

        @media (max-width: 1100px) {
            .glass { transform: scale(0.7); right: -10%; }
        }

        @media (max-width: 768px) {
            body { justify-content: center; }
            .main-container { padding-left: 0; justify-content: center; }
            .glass { display: none; }
            .auth-container { width: 95%; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <audio src="./music/New Moon." autoplay loop></audio>
        
        <div class="header">
            <img class="app-logo" src="/elements/user icon white.png">
            <h4>CEAS FIND</h4>
        </div>
        
        <div class="wave-container">
            <img class="wave1" src="/elements/wave 1.png">
            <img class="wave2" src="/elements/wave 2.png">
            <img class="wave3" src="/elements/wave 3.png">
            <img class="wave4" src="/elements/wave 4.png">
            <img class="wave5" src="/elements/wave 5.png">
            <img class="wave6" src="/elements/wave 6.png">
        </div>

        <div class="auth-container">
            <section id="login-section" class="active">
                <h1>CEAS FIND</h1>
                <label>IMPORTANT:</label>
                <p class="p-notice">Sign in with your Gordon College domain account to access the platform. Only CEAS accounts are to be accepted.</p>
                <button type="button" id="google-login-btn">Sign Up with Google</button>
                <p class="p-con">By signing in, you agree to our <a class="conditions" href="/tou.html">Terms of Use</a>  and <a class="conditions" href="/privacy.html">Privacy Policy</a>.</p>
            </section> 
        </div>
    </div>

    <script type="module" src="../BACKEND/auth.js"></script>
    <script>
        function showSection(id) {
            document.querySelectorAll('section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
