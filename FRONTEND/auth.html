<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poetsen+One&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Authentication</title>
    <style>
        :root {
            --white: #ffffff;
            --baby-blue: #a3b8ed;
            --bg-white: #f0f0f0;
            --clay: #8b7f71;
            --night: #1e3a6a;
            --onyx: #1b1b1b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--night);
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Roboto Condensed', sans-serif;
        }

        .main-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .header {
            position: absolute;
            top: 40px;
            left: 5%;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 20;
        }
        
        .app-logo {
            position: relative;
            width: 25px;
            height: auto;
            transform: scaleX(-1);
        }

        h4 {
            position: relative;
            font-size: 20px;
            font-family: 'Poetsen One', sans-serif;
            color: var(--white);
            margin: 0;
        }

        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
            width: 500px;
            margin-top: 130px;
        }

        /* Waves remain as background */
        .wave-container {
            position: absolute;
            bottom: 0px;
            left: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            pointer-events: none;
        }

        .wave1, .wave2, .wave3, .wave4, .wave5, .wave6 {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            width: 110%; 
            height: auto;
            animation: move-wave linear infinite;
        }

        .wave1 { animation-duration: 28s; z-index: 1; }
        .wave2 { animation-duration: 14s; z-index: 2; }
        .wave3 { animation-duration: 7s; z-index: 3; }
        .wave4 { animation-duration: 21s; z-index: 4; }
        .wave5 { animation-duration: 14s; z-index: 5; }
        .wave6 { animation-duration: 7s; z-index: 6; }

        @keyframes move-wave {
            0% { transform: translateX(0); }
            50% { transform: translateX(-5%); }
            100% { transform: translateX(0); }
        }

        h1 {
            text-align: center;
            font-family: 'Poetsen One', sans-serif; 
            font-weight: 180;
            color: var(--white); 
            margin-bottom: 50px; 
            font-size: 60px; /* Reduced slightly to fit better */
        }

        label { 
            display: block; 
            color: var(--baby-blue); 
            font-size: 14px; 
            margin-bottom: 10px; 
            text-align: center;
        }

        .p-notice { text-align: center; color: var(--white); margin-bottom: 30px; }
        .p-con { text-align: center; color: var(--night); margin-top: 20px; }

        a { color: var(--white); text-decoration: none; }
        a:hover { color: var(--baby-blue); text-decoration: underline; }
    
        button { 
            width: 100%; 
            padding: 12px; 
            background: var(--white); 
            color: var(--night); 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-family: 'Poetsen One', sans-serif;
            margin-bottom: 20px;
        }

        button:hover {
            transform: scale(1.05);
            background: var(--baby-blue);
            color: var(--white);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 20px;
            border: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <audio src="./music/New Moon." autoplay loop></audio>
        
        <div class="header">
            <img class="app-logo" src="/elements/user icon white.png">
            <h4>CEAS FIND</h4>
        </div>
        
        <div class="wave-container">
            <img class="wave1" src="/elements/wave 1.png">
            <img class="wave2" src="/elements/wave 2.png">
            <img class="wave3" src="/elements/wave 3.png">
            <img class="wave4" src="/elements/wave 4.png">
            <img class="wave5" src="/elements/wave 5.png">
            <img class="wave6" src="/elements/wave 6.png">
        </div>

        <div class="auth-container">
            <section id="login-section" class="active">
                <h1>CEAS FIND</h1>
                <label>IMPORTANT:</label>
                <p class="p-notice">Sign in with your Gordon College domain account. Only CEAS accounts are accepted.</p>
                <button type="button" id="google-login-btn">Sign In with Google</button>
                <p class="p-con">By signing in, you agree to our <a href="/tou.html">Terms of Use</a> and <a href="/privacy.html">Privacy Policy</a>.</p>
            </section> 

            <section id="google-registration" style="display: none;">
                <h1>Complete Registration</h1>
                <label>Enter CEAS Course Code:</label>
                <input type="text" id="google-course-code" placeholder="e.g. 123">
                <button type="button" id="submit-google-reg">Finish Registration</button>
            </section>
        </div>
    </div>

    <script type="module" src="../BACKEND/auth.js"></script>
</body>
</html>
