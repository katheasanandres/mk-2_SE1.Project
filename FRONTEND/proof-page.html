<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poetsen+One&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <title>Review Item</title>

    <style>
        :root {
            --ivory: #ece3da;
            --baby-blue: #a3b8ed;
            --sand: #d1bda4;
            --clay: #8b7f71;
            --night: #1e3a6a;
            --onyx: #1b1b1b;
            --green-status: #306546;
            --red-status: #803636;
            --gold-status: #9e8442;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--night);
            overflow: hidden;
            width: 100%;
            height: 100vh;
            font-family: 'Roboto Condensed', sans-serif;
        }

        .main-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .app-logo {
            position: absolute;
            width: 30px;
            height: auto;
            z-index: 6;
            left: 20px;
            top: 14px;
        }

        h4.nav-title {
            position: absolute;
            font-size: 18px;
            font-family: 'Poetsen One', sans-serif;
            color: var(--ivory); 
            left: 60px;
            top: 20px;
            z-index: 6;
        }

        .wave-container {
            position: relative;
            bottom: -20px;
            left: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 0;
        }

        .wave1 {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            width: 110%; 
            height: auto;
            pointer-events: none;
            z-index: 1; 
        }

        .wave2 {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            width: 110%; 
            height: auto;
            pointer-events: none;
            z-index: 2; 
        }

        .wave3 {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            width: 110%; 
            height: auto;
            pointer-events: none;
            z-index: 3; 
        }

        .wave4 {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            width: 110%; 
            height: auto;
            pointer-events: none; 
            z-index: 4; 
        }

        .wave5 {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            width: 110%; 
            height: auto;
            pointer-events: none;
            z-index: 5; 
        }

        .wave6 {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            width: 110%; 
            height: auto;
            pointer-events: none;
            z-index: 6; 
        }

        .post-card {
            position: absolute;
            z-index: 10;
            background-color: var(--ivory);
            width: 100%;
            max-width: 1000px;
            height: auto;
            border-radius: 25px 25px 0px 0px;
            padding: 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            bottom: 0;
            top: 100px;
        }

        .close-icon {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--clay);
            color: white;
            border-radius: 8px;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
        }

        .user-header h2 {
            font-family: 'Roboto Condensed', sans-serif;
            color: var(--night);
            font-size: 28px;
            margin-bottom: 2px;
        }

        .user-header p {
            color: var(--night);
            font-weight: 500;
            margin-bottom: 20px;
            text-transform: capitalize;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 150px;
            gap: 20px;
            margin-bottom: 15px;
        }

        .inputs-area textarea {
            width: 100%;
            max-width: 700px;
            min-width: 700px;
            max-height: 50px;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--clay);
            padding: 8px 0;
            margin-bottom: 10px;
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 16px;
            outline: none;
        }


        .status-options {
            background-color: var(--ivory);
            color: var(--onyx);
        }

        .upload-box {
            width: 100%;
            min-height: 200px;
            background-color: var(--sand);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            border: 2px dashed var(--clay);
            color: var(--clay);
            bottom: 0px;
        }

        .upload-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .upload-box span { font-size: 40px; margin-left: 21px;}

        .btn-submit {
            background-color: var(--clay);
            color: var(--ivory);
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            float: right;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
            bottom: 0px;
        }

        .btn-submit:hover { 
            opacity: 0.9; 
            transform: translateY(-2px); 
            background-color: var(--night);
            color: var(--ivory);
        }

    </style>
</head>
<body>
    <div class="main-container">
        <img class="app-logo" src="/elements/app-logo.png" alt="logo"> <h4 class="nav-title">CEAS FIND</h4>

        <div class="wave-container">
            <img class="wave1" src="/elements/wave 1.png">
            <img class="wave2" src="/elements/wave 2.png">
            <img class="wave3" src="/elements/wave 3.png">
            <img class="wave4" src="/elements/wave 4.png">
            <img class="wave5" src="/elements/wave 5.png">
            <img class="wave6" src="/elements/wave 6.png">
        </div>

        <div class="post-card">
            <div class="close-icon">&times;</div>

            <div class="user-header">
                <h2 id="displayUserName">Internal Security Unit</h2>
                <p id="displayUserRole">Admin</p>
            </div>

            <div class="form-grid">
                <div class="inputs-area">
                    <textarea placeholder="Add more description..." rows="2"></textarea>
                </div>
            </div>

            <label class="upload-box" for="imageInput">
                <input type="file" id="imageInput" accept="image/*" hidden>
                <div id="uploadPlaceholder">
                    <span class="material-symbols-outlined" id="upload-icon">upload</span>
                    <p>upload photo</p>
                </div>
                <img id="previewImg" src="">
            </label>

            <button class="btn-submit" onclick="handlePostSubmit()">Add Post</button>
        </div>
    </div>

    <script>
        const currentUser = {
            name: "Internal Security Unit", 
            role: "Admin" 
        };

        document.getElementById('displayUserName').innerText = currentUser.name;
        document.getElementById('displayUserRole').innerText = currentUser.role;

        const categoryOptions = [
            "Clothing & Personal Gear", "Documents & Cards", "Electronics & Gadgets",
            "Keys & Accessories", "Stationery & Books", "Wallets & Bags"
        ];

        const catInput = document.getElementById('categoryInput');
        const sugBox = document.getElementById('suggestionBox');

        catInput.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val.includes('#')) {
                const query = val.split('#').pop().toLowerCase();
                const matches = categoryOptions.filter(item => item.toLowerCase().includes(query));
                
                if (matches.length > 0) {
                    sugBox.innerHTML = matches.map(m => `<div onclick="selectCategory('${m}')">#${m}</div>`).join('');
                    sugBox.style.display = 'block';
                } else {
                    sugBox.style.display = 'none';
                }
            } else {
                sugBox.style.display = 'none';
            }
        });

        function selectCategory(name) {
            catInput.value = "#" + name;
            sugBox.style.display = 'none';
        }

        function changeStatusColor(select) {
            const val = select.value;
            if (val === "Claimed") select.style.backgroundColor = "var(--green-status)";
            else if (val === "Pending") select.style.backgroundColor = "var(--gold-status)";
            else select.style.backgroundColor = "var(--red-status)";
        }

        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('previewImg').src = event.target.result;
                    document.getElementById('previewImg').style.display = 'block';
                    document.getElementById('uploadPlaceholder').style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        function submitProof() {
    const urlParams = new URLSearchParams(window.location.search);
    const postId = parseInt(urlParams.get('postId'));
    
    const allPosts = JSON.parse(localStorage.getItem('ceas_posts')) || [];
    const post = allPosts.find(p => p.id === postId);

    if (post) {
        // 1. Mark as claimed on homepage (filled button)
        localStorage.setItem(`permanent_claimed_${postId}`, 'true');

        // 2. Add to Pending Claims (for the claimer)
        let pending = JSON.parse(localStorage.getItem('pending_claims')) || [];
        pending.push(post);
        localStorage.setItem('pending_claims', JSON.stringify(pending));

        // 3. Create Notification for the Uploader (for Review)
        let notifications = JSON.parse(localStorage.getItem('ceas_notifications')) || [];
        notifications.push({
            to: post.user,
            msg: `Someone sent a proof for your item: ${post.foundItem || post.lostItem}`,
            type: 'review',
            time: new Date().toLocaleString()
        });
        localStorage.setItem('ceas_notifications', JSON.stringify(notifications));

        // 4. Send Email via mailto
        const subject = encodeURIComponent("Proof of Ownership - CEAS FIND");
        const body = encodeURIComponent(`Hello, I have sent a proof for the item: ${post.description}. Please review it in the app.`);
        window.location.href = `mailto:${post.uploaderEmail}?subject=${subject}&body=${body}`;

        alert("Proof sent! Your claim is now under review.");
    }
}
    </script>
</body>
</html>
