<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poetsen+One&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
        <title>Ownership Proof</title>
        <style>
            :root {
                --white: #ffffff;
                --baby-blue: #a3b8ed;
                --bg-white: #e3e3e3;
                --night: #1e3a6a;
                --onyx: #1b1b1b;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background-color: var(--night);
                overflow: hidden;
                width: 100%;
                height: 100vh;
                display: flex;
            }

            .main-container {
                position: relative;
                width: 100%;
                height: 100vh;
                display: block;
                justify-content: center;
                font-family: 'Roboto Condensed';
            }

            .nav-header { 
                position: absolute; 
                top: 25px; 
                left: 30px; 
                display: flex; 
                align-items: center; 
                z-index: 20; 
            }

            .app-logo {
                width: 25px;
                height: auto;
                transform: scaleX(-1);
                flex-shrink: 0;
            }

            h4 {
                font-size: 15px;
                font-family: 'Poetsen One', sans-serif;
                color: var(--white);
                flex-grow: 1;
                margin-left: 15px;
                white-space: nowrap;
                overflow: hidden;
            }

            .wave-container { 
                position: absolute; 
                inset: 0; 
                z-index: 0; 
                pointer-events: none; 
            }

            .wave-container img { 
                position: absolute; 
                bottom: 0; 
                width: 110%; 
                height: auto; 
            }

            .proof-card {
                position: relative;
                z-index: 10;
                background-color: var(--white);
                width: 95%;
                max-width: 700px;
                height: 90vh; 
                margin: auto auto 0 auto; 
                border-radius: 15px 15px 0 0;
                display: flex;
                flex-direction: column;
                box-shadow: 0 15px 35px rgba(0,0,0,0.4);
                overflow: hidden;
                font-family: 'Roboto Condensed';
            }

            .card-header {
                padding: 40px 45px 0px 45px;
                position: relative;
                flex-shrink: 0;
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
            }

            .btn-cancel {
                background-color: transparent;
                color: var(--night);
                padding: 12px 25px;
                border: 1px solid var(--bg-white);
                border-radius: 10px;
                font-weight: bold;
                cursor: pointer;
                float: none;
                margin: 0;
                transition: 0.3s;
            }

            .btn-cancel:hover {
                background-color: var(--night);
                color: var(--white);
            }

            .user-header h2 { 
                color: var(--night); 
                font-size: 28px; 
                line-height: 1.1; 
            }

            .user-header p { 
                color: var(--night); 
                font-weight: 700; 
                text-transform: uppercase; 
                font-size: 13px; 
                margin-top: 4px; 
            }

            .card-body {
                padding: 8px 45px 25px 45px;
                overflow-y: auto;
                flex-grow: 1;
                display: flex;
                flex-direction: column;
                min-height: 0;
            }

            .card-body::-webkit-scrollbar { 
                width: 6px; 
            }

            .card-body::-webkit-scrollbar-thumb { 
                background: var(--bg-white); 
                border-radius: 10px; 
            }

            .card-body::-webkit-scrollbar-track { 
                background: transparent; 
            }

            .form-grid { 
                display: flex;
                gap: 20px;
                margin-bottom: 5px;
                align-items: flex-start; 
                flex-shrink: 0;
            }

            .inputs-area { 
                flex: 1;
            }

            .inputs-area textarea {
                width: 100%;
                background: transparent;
                border: none;
                border-bottom: 1px solid var(--bg-white);
                padding: 10px 0 0 0;
                margin-bottom: 5px;
                font-family: inherit;
                font-size: 15px;
                outline: none;
                color: var(--onyx);
            }

            textarea { 
                resize: none; 
                overflow: hidden; 
                min-height: 35px; 
                height: auto;
            }

            .upload-box {
                width: 100%;
                aspect-ratio: 16 / 8;
                background-color: var(--bg-white);
                border-radius: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                border: 2px dashed var(--bg-white);
                overflow: hidden;
                margin-top: 10px;
                position: relative;
                flex-shrink: 0;
            }

            .upload-box:hover { 
                background-color: var(--white); 
            }

            .upload-box img { 
                width: auto; 
                height: 100%; 
                object-fit:fill; 
                display: none; 
                padding: 10px 0;
                justify-self: center;
            }

            .upload-box span { 
                font-size: 40px; 
                color: var(--night); 
            }

            .upload-box p { 
                font-weight: 500px; 
                color: var(--night); 
                text-transform: lowercase; 
            }

            .btn-submit {
                background-color: var(--night);
                color: var(--white);
                padding: 12px 40px;
                border: none;
                border: 1px solid var(--bg-white);
                border-radius: 10px;
                font-weight: bold;
                cursor: pointer;
                float: none;
                margin: 0;
                transition: 0.3s;
            }

            .btn-submit:hover { 
                background-color: var(--white); 
                color: var(--night);
            }

            .action-footer {
                margin-top: auto;
                padding-top: 20px;
                display: flex;
                justify-content: flex-end;
                gap: 10px;
                width: 100%;
            }

            .add-text-label {
                color: var(--night);
                font-size: 18px;
                font-weight: bold;
            }

            .proof-send-card {
                background: #f9f9f9; 
                padding: 12px; 
                border-radius: 12px; 
                margin-bottom: 20px; 
                display: flex; 
                align-items: center; 
                gap: 15px; 
                border: 1px solid var(--bg-white);
                flex-shrink: 0;
            }

            .current-user-info {
                margin-bottom: 15px;
                font-family: 'Roboto Condensed', sans-serif;
                color: var(--night);
                flex-shrink: 0; 
            }

            .current-user-info h3 {
                font-size: 25px;
                font-weight: 700;
                line-height: 1.2;
            }

            .current-user-info p {
                font-size: 12px;
                font-weight: 400;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            @media (max-width: 600px) {
                .card-header, .card-body { 
                    padding: 25px; 
                }

                .upload-box { 
                    aspect-ratio: 4 / 3; 
                }
            }
        </style>
    </head>
    <body>
        <div class="nav-header">
            <img class="app-logo" src="/elements/user icon white.png" alt="logo">
            <h4 class="nav-title">CEAS FIND</h4>
        </div>

        <div class="wave-container">
            <img class="wave1" src="/elements/wave 1.png">
            <img class="wave2" src="/elements/wave 2.png">
            <img class="wave3" src="/elements/wave 3.png">
            <img class="wave4" src="/elements/wave 4.png">
            <img class="wave5" src="/elements/wave 5.png">
            <img class="wave6" src="/elements/wave 6.png">
        </div>

        <div class="proof-card">
            <div class="card-header">
                <div class="user-header">
                    <h2 id="displayUserName"></h2>
                    <p id="displayUserRole"></p>
                </div>

                <div class="post-card"></div>
            </div>

            <div class="card-body">
                <div class="current-user-info">
                    <h3 id="currentUserName"></h3>
                    <p id="currentUserRole"></p>
                </div>
                <div id="originalPostPreview"></div>
                <div class="form-grid">
                    <div class="inputs-area">
                        <label class="add-text-label">Add Your Image/File Proof Here</label>
                        <textarea id="descTextarea" placeholder="Add more description..." rows="1"></textarea>
                    </div>
                </div>

                <label class="upload-box" for="imageInput">
                    <input type="file" id="imageInput" accept="image/*" hidden>
                    <div id="uploadPlaceholder" style="text-align: center;">
                        <span class="material-symbols-outlined">upload</span>
                        <p>upload photo</p>
                    </div>
                    <img id="previewImg" src="">
                </label>

                <div class="action-footer">
                    <button class="btn-cancel" onclick="alert('Post Cancelled')">Cancel</button>
                    <button class="btn-submit" onclick="sendEmailProof()">Send to Email</button>
                </div>
            </div>
        </div>

    <script>
        function autoExpand(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        window.onload = function() {
            if(document.getElementById('displayUserName')) {
                document.getElementById('displayUserName').innerText = currentUser.name;
                document.getElementById('displayUserRole').innerText = currentUser.role;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('postId');
            const allPosts = JSON.parse(localStorage.getItem('ceas_posts')) || [];
            const post = allPosts.find(p => String(p.id) === String(postId));

            if (post) {
                const statusColors = { 'Unclaimed': '#1e3a6a', 'Claimed': '#a3b8ed', 'Pending': '#8a853e' };
                const sColor = statusColors[post.status] || '#8e8e8e';
                
                const previewHtml = `  
                    <p style="font-size: 13px; color: #666; margin-bottom: 5px; font-weight: bold;">Replying to:</p>
                    <div class="proof-send-card">
                        <div style="width: 50px; height: 50px; flex-shrink: 0;">
                            ${post.image ? 
                                `<img src="${post.image}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;">` : 
                                `<div style="width: 100%; height: 100%; background: #eee; border-radius: 8px; display: flex; align-items: center; justify-content: center;"><span class="material-symbols-outlined" style="color: #ccc;">image</span></div>`
                            }
                        </div>
                        <div style="flex-grow: 1;">
                            <strong style="color: #1e3a6a; font-size: 15px;">${post.user || 'Unknown'}</strong>
                            <p style="font-size: 13px; color: #333;"><strong>Item:</strong> ${post.lostItem || post.foundItem || 'Item'}</p>
                            <p style="font-size: 12px; color: #8e8e8e;">${post.timestamp || ''}</p>
                        </div>
                        <span style="background: ${sColor}; color: white; padding: 8px 8px; border-radius: 6px; font-size: 11px;">${post.status}</span>
                    </div>
                `;
                document.getElementById('originalPostPreview').innerHTML = previewHtml;

                window.currentPostData = post;
            }
        };

        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = document.getElementById('previewImg');
                    img.src = event.target.result;
                    img.style.display = 'block';
                    document.getElementById('uploadPlaceholder').style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        function sendEmailProof() {
            const post = window.currentPostData;
            const description = document.getElementById('descTextarea').value;
            const fileInput = document.getElementById('imageInput');

            if (!post || !post.uploaderEmail) {
                alert("Error: Uploader email not found.");
                return;
            }

            if (!description) {
                alert("Please add a description for your proof.");
                return;
            }

            const subject = encodeURIComponent(`Proof of Ownership: ${post.lostItem || post.foundItem}`);

            let bodyText = `Hello ${post.user},\n\n`;
            bodyText += `I am sending proof regarding the item post: "${post.lostItem || post.foundItem}".\n\n`;
            bodyText += `MY DESCRIPTION:\n${description}\n\n`;
            
            if (fileInput.files.length > 0) {
                bodyText += `(Note: I have selected an image as proof. Please ensure it is attached to this email before sending.)\n`;
            }

            const body = encodeURIComponent(bodyText);

            window.location.href = `mailto:${post.uploaderEmail}?subject=${subject}&body=${body}`;
            
            alert("Redirecting to your email app. Please verify the details and send the email.");
        }
    </script>
</body>
</html>
