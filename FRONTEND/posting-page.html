<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poetsen+One&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
        <title>Report Item</title>
        <style>
            :root {
                --white: #ffffff;
                --baby-blue: #a3b8ed;
                --bg-white: #e3e3e3;
                --night: #1e3a6a;
                --onyx: #1b1b1b;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background-color: var(--night);
                overflow: hidden;
                width: 100%;
                height: 100vh;
                display: flex;
            }

            .main-container {
                position: relative;
                width: 100%;
                height: 100vh;
                display: block;
                justify-content: center;
                font-family: 'Roboto Condensed';
            }

            .nav-header { 
                position: absolute; 
                top: 25px; 
                left: 30px; 
                display: flex; 
                align-items: center; 
                z-index: 20; 
            }

            .app-logo {
                width: 25px;
                height: auto;
                transform: scaleX(-1);
                flex-shrink: 0;
            }

            h4 {
                font-size: 15px;
                font-family: 'Poetsen One', sans-serif;
                color: var(--white);
                flex-grow: 1;
                margin-left: 15px;
                white-space: nowrap;
                overflow: hidden;
            }

            .wave-container { 
                position: absolute; 
                inset: 0; 
                z-index: 0; 
                pointer-events: none; 
            }

            .wave-container img { 
                position: absolute; 
                bottom: 0; 
                width: 110%; 
                height: auto; 
            }

            .post-card {
                position: relative;
                z-index: 10;
                background-color: var(--white);
                width: 95%;
                max-width: 700px;
                height: 90vh; 
                margin: auto auto 0 auto; 
                border-radius: 15px 15px 0 0;
                display: flex;
                flex-direction: column;
                box-shadow: 0 15px 35px rgba(0,0,0,0.4);
                overflow: hidden;
                font-family: 'Roboto Condensed';
            }

            .card-header {
                padding: 40px 45px 0px 45px;
                position: relative;
                flex-shrink: 0;
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
            }

            .btn-cancel {
                background-color: transparent;
                color: var(--night);
                padding: 12px 25px;
                border: 1px solid var(--bg-white);
                border-radius: 10px;
                font-weight: bold;
                cursor: pointer;
                float: none;
                margin: 0;
                transition: 0.3s;
            }

            .btn-cancel:hover {
                background-color: var(--night);
                color: var(--white);
            }

            .user-header h2 { 
                color: var(--night); 
                font-size: 28px; 
                line-height: 1.1; 
            }

            .user-header p { 
                color: var(--night); 
                font-weight: 700; 
                text-transform: uppercase; 
                font-size: 13px; 
                margin-top: 4px; 
            }

            .card-body {
                padding: 8px 45px 25px 45px;
                overflow-y: auto;
                flex-grow: 1;
                display: flex;
                flex-direction: column;
                min-height: 0;
            }

            .card-body::-webkit-scrollbar { 
                width: 6px; 
            }

            .card-body::-webkit-scrollbar-thumb { 
                background: var(--bg-white); 
                border-radius: 10px; 
            }

            .card-body::-webkit-scrollbar-track { 
                background: transparent; 
            }

            .form-grid { 
                display: flex;
                gap: 20px;
                margin-bottom: 5px;
                align-items: flex-start; 
                flex-shrink: 0;
            }

            .inputs-area { 
                flex: 1;
            }

            .inputs-area textarea {
                width: 100%;
                background: transparent;
                border: none;
                border-bottom: 1px solid var(--bg-white);
                padding: 10px 0 0 0;
                margin-bottom: 5px;
                font-family: inherit;
                font-size: 15px;
                outline: none;
                color: var(--onyx);
            }

            .hashtag-container { 
                position: relative; 
                width: 100%; 
            }

            .suggestions {
                position: absolute;
                top: 100%; left: 0; width: 100%;
                background: var(--white);
                border-radius: 10px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.2);
                z-index: 50;
                display: none;
                max-height: 150px;
                overflow-y: auto;
            }

            .suggestions div { 
                padding: 12px; 
                cursor: pointer; 
                border-bottom: 1px solid var(--night); 
                color: var(--onyx); 
            }

            .suggestions div:hover { 
                background: var(--bg-white); 
            }

            .suggestions::-webkit-scrollbar { 
                width: 6px; 
            }

            .suggestions::-webkit-scrollbar-thumb { 
                background: var(--bg-white); 
                border-radius: 10px; 
            }

            .suggestions::-webkit-scrollbar-track { 
                background: transparent; 
            }

            textarea { 
                resize: none; 
                overflow: hidden; 
                min-height: 35px; 
            }

            .status-area {
                width: 140px;
                flex-shrink: 0;
                margin-top: 3px;
            }

            #statusSelect {
                width: 100%;
                padding: 10px 25px; 
                border-radius: 10px;
                border: none;
                color: var(--white);
                font-weight: bold;
                background-color: var(--night);
                cursor: pointer;
                text-align: left;
                appearance: none;
                -webkit-appearance: none;
                -moz-appearance: none;
                background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22white%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
                background-repeat: no-repeat;
                background-position: right 15px center; 
                background-size: 18px;
            }

            .status-options {
                background-color: var(--white);
                color: var(--night);
            }

            #statusSelect:hover {
                background-color: var(--night);
                color: var(--white);
            }

            .upload-box {
                width: 100%;
                aspect-ratio: 16 / 8;
                background-color: var(--bg-white);
                border-radius: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                border: 2px dashed var(--bg-white);
                overflow: hidden;
                margin-top: 10px;
                position: relative;
                flex-shrink: 0;
            }

            .upload-box:hover { 
                background-color: var(--white); 
            }

            .upload-box img { 
                width: auto; 
                height: 100%; 
                object-fit:fill; 
                display: none; 
                padding: 10px 0;
                justify-self: center;
            }

            .upload-box span { 
                font-size: 40px; 
                color: var(--night); 
            }

            .upload-box p { 
                font-weight: 500px; 
                color: var(--night); 
                text-transform: lowercase; 
            }

            .btn-submit {
                background-color: var(--night);
                color: var(--white);
                padding: 12px 40px;
                border: none;
                border: 1px solid var(--bg-white);
                border-radius: 10px;
                font-weight: bold;
                cursor: pointer;
                float: none;
                margin: 0;
                transition: 0.3s;
            }

            .btn-submit:hover { 
                background-color: var(--white); 
                color: var(--night);
            }

            .action-footer {
                margin-top: auto;
                padding-top: 20px;
                display: flex;
                justify-content: flex-end;
                gap: 10px;
                width: 100%;
            }

            @media (max-width: 600px) {
                .card-header, .card-body { 
                    padding: 25px; 
                }

                .upload-box { 
                    aspect-ratio: 4 / 3; 
                }
            }
        </style>
    </head>
    <body>
        <div class="nav-header">
            <img class="app-logo" src="/elements/user icon white.png" alt="logo">
            <h4 class="nav-title">CEAS FIND</h4>
        </div>

        <div class="wave-container">
            <img class="wave1" src="/elements/wave 1.png">
            <img class="wave2" src="/elements/wave 2.png">
            <img class="wave3" src="/elements/wave 3.png">
            <img class="wave4" src="/elements/wave 4.png">
            <img class="wave5" src="/elements/wave 5.png">
            <img class="wave6" src="/elements/wave 6.png">
        </div>

        <div class="post-card">
            <div class="card-header">
                <div class="user-header">
                    <h2 id="displayUserName"></h2>
                    <p id="displayUserRole"></p>
                </div>

                <div class="status-area">
                    <select id="statusSelect" onchange="changeStatusColor(this)">
                        <option value="Unclaimed">Unclaimed</option>
                        <option value="Claimed">Claimed</option>
                        <option value="Pending">Pending</option>
                    </select>
                </div>
            </div>

            <div class="card-body">
                <div class="form-grid">
                    <div class="inputs-area">
                        <textarea placeholder="Lost: " rows="1"></textarea>
                        <textarea placeholder="Found: " rows="1"></textarea>
                        <div class="hashtag-container">
                            <textarea id="categoryInput" placeholder="#Add Category" rows="1"></textarea>
                            <div id="suggestionBox" class="suggestions"></div>
                        </div>
                        <textarea id="descTextarea" placeholder="Add more description..." rows="1"></textarea>
                    </div>
                </div>

                <label class="upload-box" for="imageInput">
                    <input type="file" id="imageInput" accept="image/*" hidden>
                    <div id="uploadPlaceholder" style="text-align: center;">
                        <span class="material-symbols-outlined">upload</span>
                        <p>upload photo</p>
                    </div>
                    <img id="previewImg" src="">
                </label>

                <div class="action-footer">
                    <button class="btn-cancel" onclick="alert('Post Cancelled')">Cancel</button>
                    <button class="btn-submit" onclick="handlePostSubmit()">Add Post</button>
                </div>
            </div>
        </div>

        <script type="module">
    // 1. Import your Firebase tools and the upload function
    import { auth } from "./BACKEND/db.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { uploadPost } from "./BACKEND/postingpage.js";

    // 2. Handle User Display (Wait for Firebase to load the user)
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('displayUserName').innerText = user.displayName || "User";
            // Note: Role is usually handled via Firestore, but for now we'll keep it static
            document.getElementById('displayUserRole').innerText = "Student"; 
        } else {
            // If not logged in, kick them back to login page
            window.location.href = "auth.html";
        }
    });

    // 3. Category Suggestion Logic (Keep this as is, it's great!)
    const categories = ["Clothing & Personal Gear", "Documents & Cards", "Electronics & Gadgets", "Keys & Accessories", "Stationery & Books", "Wallets & Bags"];
    const catInput = document.getElementById('categoryInput');
    const sugBox = document.getElementById('suggestionBox');

    catInput.addEventListener('input', (e) => {
        const val = e.target.value;
        if (val.includes('#')) {
            const query = val.split('#').pop().toLowerCase();
            const matches = categories.filter(c => c.toLowerCase().includes(query));
            if (matches.length > 0) {
                sugBox.innerHTML = matches.map(m => `<div class="sug-item">#${m}</div>`).join('');
                sugBox.style.display = 'block';
                
                // Add click listeners to new suggestions
                document.querySelectorAll('.sug-item').forEach(item => {
                    item.onclick = () => {
                        catInput.value = item.innerText;
                        sugBox.style.display = 'none';
                    };
                });
            } else { sugBox.style.display = 'none'; }
        } else { sugBox.style.display = 'none'; }
    });

    // 4. UI Textarea Auto-expand
    document.querySelectorAll('.inputs-area textarea').forEach(textarea => {
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    });

    // 5. Image Preview Logic
    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = document.getElementById('previewImg');
                img.src = event.target.result;
                img.style.display = 'block';
                document.getElementById('uploadPlaceholder').style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    });

    // 6. Status Color Change
    window.changeStatusColor = function(select) {
        const colors = { 'Unclaimed': '#1e3a6a', 'claimed': '#a3b8ed', 'Pending': '#8a853e' };
        select.style.backgroundColor = colors[select.value];
    };

    // 7. THE BRIDGE: Connect your button to the Firebase uploadPost function
    window.handlePostSubmit = async function() {
        const submitBtn = document.querySelector('.post-btn'); // Assuming your button has this class
        
        try {
            // Disable button to prevent double-posting
            if(submitBtn) submitBtn.disabled = true;
            
            // This calls the export function from your postingpage.js
            await uploadPost(); 
            
        } catch (error) {
            console.error("Submission failed:", error);
            if(submitBtn) submitBtn.disabled = false;
        }
    };
</script>
    </body>
</html>
